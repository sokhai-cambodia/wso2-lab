services:
  postgres:
    image: postgres:15
    container_name: wso2-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wso2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wso2123}
      POSTGRES_DB: ${POSTGRES_DB:-wso2db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wso2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wso2 -d wso2db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  wso2is:
    image: wso2/wso2is:7.0.0
    container_name: wso2is-local
    ports:
      - "9444:9444"
    command: ["sh", "-c", "/home/wso2carbon/docker-entrypoint.sh -DportOffset=1 -Dorg.wso2.IdentityRESTAPISecurity.disableBasicAuth=false"]
    environment:
      - JVM_MEM_OPTS=-Xms1g -Xmx2g
    volumes:
      - ./libs/postgresql-42.7.3.jar:/home/wso2carbon/wso2is-7.0.0/repository/components/lib/postgresql-42.7.3.jar
      - ./config/is/deployment.toml:/home/wso2carbon/wso2is-7.0.0/repository/conf/deployment.toml
      # Phase 9: replaces the image's stock cert, which shipped already expired
      - ./config/is/wso2carbon.jks:/home/wso2carbon/wso2is-7.0.0/repository/resources/security/wso2carbon.jks
      - ./config/is/client-truststore.jks:/home/wso2carbon/wso2is-7.0.0/repository/resources/security/client-truststore.jks
    restart: unless-stopped
    stop_grace_period: 60s
    networks:
      - wso2-network
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:9444/api/health-check/v1.0/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  wso2apim:
    image: wso2/wso2am:4.3.0
    container_name: wso2apim-local
    ports:
      - "9443:9443"
      - "8243:8243"
      - "8280:8280"
    environment:
      - JVM_MEM_OPTS=-Xms1g -Xmx2g
    volumes:
      - ./libs/postgresql-42.7.3.jar:/home/wso2carbon/wso2am-4.3.0/repository/components/lib/postgresql-42.7.3.jar
      - ./config/apim/deployment.toml:/home/wso2carbon/wso2am-4.3.0/repository/conf/deployment.toml
      # Phase 5, M2: Custom mediation sequence — injected at container startup
      - ./config/apim/sequences/custom-header-sequence.xml:/home/wso2carbon/wso2am-4.3.0/repository/deployment/server/synapse-configs/default/sequences/custom-header-sequence.xml
      # Phase 9: trusts the (no-longer-expired) IS cert mounted into wso2is above
      - ./config/apim/client-truststore.jks:/home/wso2carbon/wso2am-4.3.0/repository/resources/security/client-truststore.jks
    restart: unless-stopped
    stop_grace_period: 60s
    networks:
      - wso2-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9443/api/am/publisher/v4/apis -o /dev/null -w '%{http_code}' | grep -qE '200|401'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Phase 5, M3: Async event queue — receives APIM gateway events
  rabbitmq:
    image: rabbitmq:3-management
    container_name: wso2-rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI (guest / guest)
    networks:
      - wso2-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # FastAPI backend — owns IS credentials, handles auth flow + API resource endpoints
  # Internal-only: no host port exposed; reachable only from APIM inside Docker network
  backend:
    build: ./backend
    container_name: wso2-backend
    ports:
      - "8000:8000"
    environment:
      # WSO2 IS — broker for GitHub federated login
      - WSO2_IS_URL=https://wso2is-local:9444
      - WSO2_IS_PUBLIC_URL=https://localhost:9444
      - WSO2_IS_CLIENT_ID=${WSO2_IS_CLIENT_ID}
      - WSO2_IS_CLIENT_SECRET=${WSO2_IS_CLIENT_SECRET}
      # Name of the GitHub connection in IS (Connections tab — must match exactly)
      - GITHUB_IDP_NAME=${GITHUB_IDP_NAME:-GitHub}
      # WSO2 APIM — URL used only to load JWKS for X-JWT-Assertion verification
      - WSO2_APIM_URL=https://wso2apim:9443
      # OAuth callback URL — must match IS registered callback (browser-accessible)
      - AUTH_CALLBACK_URL=https://portal.local.test/callback
      - FRONTEND_URL=https://portal.local.test
    networks:
      - wso2-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      wso2is:
        condition: service_healthy
      wso2apim:
        condition: service_healthy

  # Next.js frontend — all traffic (auth + APIs) routed through APIM gateway
  frontend:
    build: ./frontend
    container_name: wso2-frontend
    ports:
      - "3000:3000"
    environment:
      # Single gateway entry point for all API and auth calls
      - NEXT_PUBLIC_BACKEND_URL=https://gateway.local.test/lab/1.0
      - NEXT_PUBLIC_APIM_GATEWAY_URL=https://gateway.local.test
    volumes:
      - ./certs:/certs:ro
    networks:
      - wso2-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  # TLS termination + reverse proxy for .local.test subdomains
  nginx:
    image: nginx:alpine
    container_name: wso2-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - wso2apim
      - wso2is
    networks:
      - wso2-network
    restart: unless-stopped

networks:
  wso2-network:
    driver: bridge

volumes:
  postgres_data:
