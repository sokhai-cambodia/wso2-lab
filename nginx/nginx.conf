events {}

http {
    server {
        listen 443 ssl;
        server_name portal.local.test;

        ssl_certificate     /etc/nginx/certs/local.pem;
        ssl_certificate_key /etc/nginx/certs/local-key.pem;

        location / {
            proxy_pass         http://frontend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name gateway.local.test;

        ssl_certificate     /etc/nginx/certs/local.pem;
        ssl_certificate_key /etc/nginx/certs/local-key.pem;

        location / {
            proxy_pass         https://wso2apim:8243;
            proxy_ssl_verify   off;
            # Deliberately NOT $host: APIM's gateway matches its own hostname
            # ("localhost" in deployment.toml) / service name for API dispatch;
            # forwarding gateway.local.test as Host breaks context resolution.
            proxy_set_header   Host              wso2apim:8243;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name is.local.test;

        ssl_certificate     /etc/nginx/certs/local.pem;
        ssl_certificate_key /etc/nginx/certs/local-key.pem;

        location / {
            proxy_pass         https://wso2is:9444;
            proxy_ssl_verify   off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }
    }
}
